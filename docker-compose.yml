version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.scheduler beat --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy